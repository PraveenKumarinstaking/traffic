name: emergency_aware_traffic_control
version: "1.0.0"
description: "A real-world emergency-aware traffic signal control environment. Manage a 4-way intersection to minimize congestion and prioritize emergency vehicles."
author: "Antigravity Assistant"
license: "MIT"

environment:
  entrypoint: "env:TrafficEnvironment"
  max_steps: 100
  observation_space: "Observation"
  action_space: "Action"

tasks:
  - id: congestion_relief
    name: "Task 1 - Basic Congestion Relief"
    difficulty: "Easy"
    objective: "Reduce total queue length over a short horizon."
    verifier: "grader:grade_congestion_relief"
  - id: fair_scheduling
    name: "Task 2 - Fair Phase Scheduling"
    difficulty: "Medium"
    objective: "Balance traffic flow across all four directions without starvation."
    verifier: "grader:grade_fair_scheduling"
  - id: emergency_priority
    name: "Task 3 - Emergency Vehicle Prioritization"
    difficulty: "Hard"
    objective: "Detect and prioritize emergency vehicles with minimal delay."
    verifier: "grader:grade_emergency_priority"
  - id: throughput_maximization
    name: "Task 4 - Throughput Maximization"
    difficulty: "Medium"
    objective: "Maximize total vehicles served per step."
    verifier: "grader:grade_throughput_maximization"
